<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:hsl(222,47%,6%);stop-opacity:1" />
      <stop offset="50%" style="stop-color:hsl(222,47%,10%);stop-opacity:1" />
      <stop offset="100%" style="stop-color:hsl(174,84%,15%);stop-opacity:1" />
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="hsl(174,84%,40%)" stroke-width="0.15" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#heroGrad)"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>
</svg>
